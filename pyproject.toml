[tool.poetry]
name = "puppytalk-api"
version = "1.0.0"
description = "FastAPI 기반의 커뮤니티 백엔드 API 서버"
authors = ["kyjness <kyjness@naver.com>"]
readme = "README.md"
license = "MIT"
keywords = ["fastapi", "api", "community", "backend"]
packages = [{ include = "app" }]

[tool.poetry.dependencies]
python = "^3.8"
fastapi = ">=0.115.0"
uvicorn = { extras = ["standard"], version = ">=0.24.0" }
pydantic = { version = ">=2.10.0", extras = ["email"] }
python-dotenv = "1.0.0"
bcrypt = "4.1.2"
sqlalchemy = ">=2.0.0"
pymysql = ">=1.1.0"
cryptography = ">=41.0.0"
python-multipart = ">=0.0.6"
boto3 = ">=1.28.0"
gunicorn = ">=21.0.0"
redis = ">=5.0.0"
pyjwt = "^2.8.0"

[tool.poetry.group.dev.dependencies]
pytest = ">=7.0.0"
pytest-asyncio = ">=0.21.0"
httpx = ">=0.24.0"
alembic = ">=1.13.0"
ruff = "^0.15.5"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
testpaths = ["test"]
pythonpath = ["."]
python_files = ["*.py"]
