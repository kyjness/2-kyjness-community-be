site_name: PuppyTalk Backend Docs
theme:
  name: material
  features:
    - navigation.tabs
    - content.code.copy
    - navigation.top
    - search.suggest
    - search.highlight

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  - toc:
      permalink: true
      slugify: !!python/name:pymdownx.slugs.uslugify

nav:
  - Home: index.md
  - 인프라 설계:
      - AWS_AISCHOOl고가용성 인프라 구축 프로젝트_강유진: infrastructure-reliability-design.md
      - AWS_AISCHOOl쿠버네티스 배포 및 CI/CD 파이프라인 구축_강유진: kubernetes-cicd-pipeline-report.md
  - 아키텍처: architecture.md
  - API 명세: api-codes.md