site_name: PuppyTalk Backend Docs
theme:
  name: material
  features:
    - navigation.tabs
    - content.code.copy
    - navigation.top
    - search.suggest
    - search.highlight

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  - toc:
      permalink: true
      slugify: !!python/name:pymdownx.slugs.uslugify

nav:
  - Home: index.md
  - 인프라 설계:
      - AWS_AISCHOOl고가용성 인프라 구축 프로젝트_강유진: infrastructure-reliability-design.md
      - AWS_AISCHOOl쿠버네티스 배포 및 CI/CD 파이프라인 구축_강유진: kubernetes-cicd-pipeline-report.md
  - 아키텍처:
      - 개요 (허브): architecture.md
      - 요청·API 계약: request-and-api-contract.md
      - 보안: security.md
      - 실시간·알림: realtime-notifications.md
      - 도메인 플로우: domain-flows.md
  - 아키텍처 의사결정(ADR):
      - 개요: adr/README.md
      - 0001 조회수 집계: adr/0001-view-count-aggregation.md
      - 0002 분산 Rate Limit: adr/0002-distributed-rate-limit.md
      - 0003 POST 멱등성: adr/0003-idempotency-keys.md
      - 0004 실시간 Fanout: adr/0004-realtime-fanout-pubsub.md
      - 0005 식별자 전략: adr/0005-identifier-strategy.md
  - API 명세: api-codes.md