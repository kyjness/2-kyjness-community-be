# PuppyTalk / kyjness-community - 로컬 개발용 Docker Compose
# 사용: docker compose up -d
# 빌드: docker compose up --build -d
# 프론트: http://localhost:8080  |  백엔드 API: http://localhost:8000  |  API 문서: http://localhost:8000/docs

name: puppytalk

services:
  mysql:
    image: mysql:8.0
    container_name: puppytalk-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-puppytalk}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./2-kyjness-community-be/docs/puppytalkdb.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  backend:
    image: kyjness/puppytalk-backend:latest
    build:
      context: ./2-kyjness-community-be
      dockerfile: Dockerfile
    container_name: puppytalk-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./2-kyjness-community-be/.env.production
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-rootpassword}
      DB_NAME: ${DB_NAME:-puppytalk}
      BE_API_URL: http://localhost:8000
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
    volumes:
      - backend_upload:/app/upload
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    image: kyjness/puppytalk-frontend:latest
    build:
      context: ./2-kyjness-community-fe
      dockerfile: Dockerfile
      args:
        API_BASE_URL: http://localhost:8000/v1
    container_name: puppytalk-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  backend_upload:
