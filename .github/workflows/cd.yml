# AWS 수동 배포(CD). ECS/ECR 이름은 Terraform(ecs.tf, ecr.tf) 및 Jenkinsfile 과 맞출 것.
name: CD

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-2
  PROJECT_NAME: puppytalk-v2
  ECR_REPOSITORY: puppytalk-v2-be
  ECS_CLUSTER: puppytalk-v2-cluster
  ECS_SERVICE: puppytalk-v2-be-service

jobs:
  deploy:
    name: Build, push to ECR, deploy ECS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-backend-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.run_number }}
        run: |
          set -euo pipefail
          ECR_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}"
          docker build -t "${ECR_IMAGE}:${IMAGE_TAG}" -t "${ECR_IMAGE}:latest" .
          docker push "${ECR_IMAGE}:${IMAGE_TAG}"
          docker push "${ECR_IMAGE}:latest"

      - name: Force new ECS deployment
        run: |
          set -euo pipefail
          aws ecs update-service \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --force-new-deployment \
            --region "${AWS_REGION}"

      - name: Prune local Docker images
        if: always()
        run: docker image prune -f || true
