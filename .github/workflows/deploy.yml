# CD: ECR 빌드·푸시 후 ECS 서비스 롤링 배포.
# - DB 마이그레이션(Alembic)은 GitHub Actions에서 실행하지 않음(프라이빗 RDS + 러너 퍼블릭망·DB 시크릿 노출 방지).
#   컨테이너 entrypoint 등에서 VPC 내부 DB로 alembic upgrade head 수행하도록 별도 구성 권장.
# - 장기적으로 AWS 자격증명은 IAM User Access Key 대신 GitHub OIDC → IAM Role(aws-actions/configure-aws-credentials role-to-assume) 권장.
name: Deploy Backend to Amazon ECS (Blue/Green)

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: ap-northeast-2
  # Terraform ecr.tf: aws_ecr_repository.be → ${project_name}-be (= puppytalk-be)
  ECR_REPOSITORY: puppytalk-be
  ECS_SERVICE: puppytalk-be-service
  ECS_CLUSTER: puppytalk-cluster
  # describe-task-definition 대상 = Task Definition family (서비스 이름과 다를 수 있음)
  ECS_TASK_DEFINITION_FAMILY: puppytalk-be-task
  ECS_TASK_DEF_FILE: task-definition.json
  CONTAINER_NAME: puppytalk-be-container

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch current ECS task definition from AWS
        run: |
          aws ecs describe-task-definition \
            --task-definition "${ECS_TASK_DEFINITION_FAMILY}" \
            --query taskDefinition \
            --output json | jq 'del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )' > "${ECS_TASK_DEF_FILE}"
          test -s "${ECS_TASK_DEF_FILE}"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEF_FILE }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          wait-for-service-stability: true
