# CI만 수행 (lint → test). CD는 GitHub → Jenkins 네이티브 웹훅으로 트리거 — Actions에서 중복 호출 없음.
# ECS/ECR 이름은 인프라 Terraform(ecs.tf, ecr.tf) 및 Jenkinsfile 과 맞출 것.
name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint & quality (ruff, pyright, audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Ruff lint
        run: uv run poe lint-check

      - name: Ruff format (check)
        run: uv run poe format-check

      - name: Pyright
        run: uv run poe typecheck

      - name: pip-audit
        run: uv run poe audit

  test:
    name: Run tests (unit + integration)
    needs: lint
    runs-on: ubuntu-latest
    env:
      TEST_DB_URL: postgresql+psycopg://postgres:testpassword@localhost:5432/puppytalk_test
      WRITER_DB_URL: postgresql+psycopg://postgres:testpassword@localhost:5432/puppytalk_test
      READER_DB_URL: postgresql+psycopg://postgres:testpassword@localhost:5432/puppytalk_test
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: testpassword
      DB_NAME: puppytalk_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-dummy-jwt-secret-min-32-chars-for-hs256-tests
      JWT_ALGORITHM: HS256
      STORAGE_BACKEND: local
      DEBUG: "false"
      COOKIE_SECURE: "false"
      TRUST_X_FORWARDED_FOR: "false"
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      S3_BUCKET_NAME: dummy-ci-bucket
      S3_ENDPOINT_URL: ""
      BE_API_URL: http://localhost:8000
      DB_INIT_MAX_ATTEMPTS: "5"
      DB_INIT_RETRY_DELAY_SECONDS: "2"

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: puppytalk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d puppytalk_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Verify PostgreSQL and pg_trgm
        run: |
          uv run python - <<'PY'
          import asyncio
          import os
          from sqlalchemy import text
          from sqlalchemy.ext.asyncio import create_async_engine

          async def main() -> None:
              url = os.environ["TEST_DB_URL"]
              engine = create_async_engine(url)
              async with engine.begin() as conn:
                  await conn.execute(text("CREATE EXTENSION IF NOT EXISTS pg_trgm"))
                  r = await conn.execute(
                      text("SELECT 1 FROM pg_extension WHERE extname = 'pg_trgm'")
                  )
                  assert r.scalar_one() == 1
              await engine.dispose()
          asyncio.run(main())
          PY

      - name: Run pytest
        run: uv run pytest tests/ -v --tb=short
