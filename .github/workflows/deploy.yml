name: Deploy Backend to Amazon ECS (Blue/Green)

on:
  push:
    branches: [main]
  pull_request: # [수정] PR 시에도 워크플로우가 실행되도록 추가
    branches: [main]

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: puppytalk-be
  ECS_SERVICE: puppytalk-be-service
  ECS_CLUSTER: puppytalk-cluster
  ECS_TASK_DEFINITION_FAMILY: puppytalk-be-task
  ECS_TASK_DEF_FILE: task-definition.json
  CONTAINER_NAME: puppytalk-be-container

jobs:
  # 1. Lint 단계: PR/Push 모두 실행, 공용 서버에서 가볍게!
  lint:
    name: Lint & quality (ruff, pyright, audit)
    runs-on: ubuntu-latest # [수정] 공용 서버를 사용하여 Upstream PR 에러 방지
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Ruff lint
        run: uv run poe lint-check

      - name: Ruff format (check)
        run: uv run poe format-check

      - name: Pyright
        run: uv run poe typecheck

      - name: pip-audit
        run: uv run poe audit

  # 2. Test 단계: PR/Push 모두 실행, 서비스 컨테이너(Postgres/Redis) 활용
  test:
    name: Run tests (unit + integration)
    needs: lint
    runs-on: ubuntu-latest # [수정] 공용 서버 사용 (GitHub 제공 서비스 컨테이너 최적화)
    env:
      TEST_DB_URL: postgresql+psycopg://postgres:testpassword@localhost:5432/puppytalk_test
      WRITER_DB_URL: postgresql+psycopg://postgres:testpassword@localhost:5432/puppytalk_test
      READER_DB_URL: postgresql+psycopg://postgres:testpassword@localhost:5432/puppytalk_test
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: testpassword
      DB_NAME: puppytalk_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-dummy-jwt-secret-min-32-chars-for-hs256-tests
      JWT_ALGORITHM: HS256
      STORAGE_BACKEND: local
      DEBUG: "false"
      COOKIE_SECURE: "false"
      TRUST_X_FORWARDED_FOR: "false"
      AWS_ACCESS_KEY_ID: dummy
      AWS_SECRET_ACCESS_KEY: dummy
      S3_BUCKET_NAME: dummy-ci-bucket
      S3_ENDPOINT_URL: ""
      BE_API_URL: http://localhost:8000
      DB_INIT_MAX_ATTEMPTS: "5"
      DB_INIT_RETRY_DELAY_SECONDS: "2"

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: puppytalk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d puppytalk_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Verify PostgreSQL and pg_trgm
        run: |
          uv run python - <<'PY'
          import asyncio
          import os
          from sqlalchemy import text
          from sqlalchemy.ext.asyncio import create_async_engine

          async def main() -> None:
              url = os.environ["TEST_DB_URL"]
              engine = create_async_engine(url)
              async with engine.begin() as conn:
                  await conn.execute(text("CREATE EXTENSION IF NOT EXISTS pg_trgm"))
                  r = await conn.execute(
                      text("SELECT 1 FROM pg_extension WHERE extname = 'pg_trgm'")
                  )
                  assert r.scalar_one() == 1
              await engine.dispose()
          asyncio.run(main())
          PY

      - name: Run pytest
        run: uv run pytest tests/ -v --tb=short

  # 3. Deploy 단계: 오직 내 레포에 Push될 때만 내 전용 일꾼(Runner)으로 실행!
  deploy:
    name: Build and Deploy
    needs: test
    # [수정] 핵심 조건: PR일 때는 실행하지 않고, 메인 브랜치에 직접 Push될 때만 작동!
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted # 여기서만 사용자님의 Ubuntu EC2 사용
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch current ECS task definition from AWS
        run: |
          aws ecs describe-task-definition \
            --task-definition "${ECS_TASK_DEFINITION_FAMILY}" \
            --query taskDefinition \
            --output json | jq 'del(
              .taskDefinitionArn,
              .revision,
              .status,
              .requiresAttributes,
              .compatibilities,
              .registeredAt,
              .registeredBy
            )' > "${ECS_TASK_DEF_FILE}"
          test -s "${ECS_TASK_DEF_FILE}"

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Fill in the new image ID in the Amazon ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEF_FILE }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          wait-for-service-stability: true