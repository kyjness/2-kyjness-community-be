name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  quality:
    name: lint · format · type · vulture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync (dev)
        run: uv sync --extra dev --frozen
      - run: uv run poe lint-check
      - run: uv run poe format-check
      - run: uv run poe typecheck
      - run: uv run poe vulture-check

  test:
    name: pytest (unit + integration)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: puppytalk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # DB 스키마는 conftest가 create_all + pg_trgm으로 세운다(alembic 아님).
      TEST_DB_URL: postgresql+psycopg://postgres:postgres@localhost:5432/puppytalk_test
      # 스토리지 통합 테스트(test_storage_minio)는 이 env가 있으면 MinIO 대상으로 실행된다(ADR 0010).
      S3_ENDPOINT_URL: http://localhost:9000
      S3_BUCKET_NAME: puppytalk
      S3_PUBLIC_BASE_URL: http://localhost:9000/puppytalk
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_REGION: ap-northeast-2
    steps:
      - uses: actions/checkout@v4
      # 공식 minio 이미지는 `server /data` 인자가 필요해 GH service로 못 띄우므로 docker run으로 기동.
      - name: Start MinIO
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/minio/health/ready && break
            sleep 1
          done
      - name: Create bucket
        run: aws --endpoint-url http://localhost:9000 s3 mb s3://puppytalk || true
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          AWS_DEFAULT_REGION: ap-northeast-2
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync (dev)
        run: uv sync --extra dev --frozen
      - name: Run tests
        run: uv run pytest tests/unit tests/integration -q

  security:
    name: pip-audit (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync (dev)
        run: uv sync --extra dev --frozen
      - run: uv run poe audit

  docker:
    name: docker build (+ push on main)
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      # main push일 때만 GHCR 로그인·push. PR/기타 브랜치는 빌드 검증만.
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/puppytalk-be:latest
            ghcr.io/${{ github.repository_owner }}/puppytalk-be:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
