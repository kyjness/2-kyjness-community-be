name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  quality:
    name: lint · format · type · vulture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync (dev)
        run: uv sync --extra dev --frozen
      - run: uv run poe lint-check
      - run: uv run poe format-check
      - run: uv run poe typecheck
      - run: uv run poe vulture-check

  test:
    name: pytest (unit + integration)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: puppytalk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # 통합 테스트는 ASGITransport(lifespan 미실행)라 Redis/MinIO 불필요 — Postgres만 있으면 된다.
      TEST_DB_URL: postgresql+psycopg://postgres:postgres@localhost:5432/puppytalk_test
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync (dev)
        run: uv sync --extra dev --frozen
      - name: Run tests
        run: uv run pytest tests/unit tests/integration -q

  security:
    name: pip-audit (informational)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync (dev)
        run: uv sync --extra dev --frozen
      - run: uv run poe audit

  docker:
    name: docker build (+ push on main)
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
      # main push일 때만 GHCR 로그인·push. PR/기타 브랜치는 빌드 검증만.
      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/puppytalk-be:latest
            ghcr.io/${{ github.repository_owner }}/puppytalk-be:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
